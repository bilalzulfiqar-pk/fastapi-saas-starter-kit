services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saas_starter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_starter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./.env:/workspace/.env
    working_dir: /workspace/apps/api
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
    working_dir: /workspace/apps/web
    command: /usr/local/bin/web-dev-entrypoint

volumes:
  postgres_data:
  web_node_modules:
  web_app_node_modules:
